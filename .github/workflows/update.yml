name: Update

on:
  pull_request:
    paths:
      - .github/workflows/update.yml
  workflow_dispatch:

permissions: {}

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: 1.26.x

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          lfs: true
          fetch-depth: 0 #for better blame info

      - name: Get last commit of coraza
        id: coraza-latest-commit
        run: |
          echo "long=$(gh api repos/corazawaf/coraza/commits/main -q .sha)" >> $GITHUB_OUTPUT
          echo "short=$(gh api repos/corazawaf/coraza/commits/main -q .sha | cut -c 1-8)" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest coraza
        env:
          CORAZA_COMMIT: ${{ steps.coraza-latest-commit.outputs.long }}
        run: |
          go get -u github.com/corazawaf/coraza/v3@"${CORAZA_COMMIT}"
          go mod tidy

      - name: Tests and coverage
        run: go run mage.go test

      - name: Generate content
        run: go run mage.go generate

      - name: Verify Changed files
        uses: tj-actions/verify-changed-files@a1c6acee9df209257a246f2cc6ae8cb6581c1edf # v20
        id: verify-changed-files
        with:
          files: |
             content/docs/*
             go.mod
             go.sum

      - name: List changed files
        if: ${{ github.event_name == 'pull_request' }}
        env:
          CHANGED_FILES: ${{ steps.verify-changed-files.outputs.changed_files }}
          CORAZA_SHORT: ${{ steps.coraza-latest-commit.outputs.short }}
          CORAZA_LONG: ${{ steps.coraza-latest-commit.outputs.long }}
          ACTOR: ${{ github.actor }}
        run: |
          cat <<EOF > $GITHUB_STEP_SUMMARY
          # Changed files:
          $CHANGED_FILES

          # PR information:
          **commit-message**: docs: upgrades coraza docs to github.com/corazawaf/coraza/v3@${CORAZA_SHORT}
          **branch**: upgrades_coraza_${CORAZA_SHORT}
          **title**: docs: upgrades to latest coraza
          **assignees**: ${ACTOR}
          **body**: This PR upgrades the docs to latest coraza commit namely [${CORAZA_SHORT}](https://github.com/corazawaf/coraza/tree/${CORAZA_LONG})
          EOF

      - name: Create Pull Request
        if: ${{ github.event_name != 'pull_request' && steps.verify-changed-files.outputs.files_changed == 'true' }}
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        id: create-pr
        with:
          add-paths: content/docs
          commit-message: 'docs: upgrades coraza docs to ${{ steps.coraza-latest-commit.outputs.short }}'
          signoff: true
          branch: upgrades_coraza_${{ steps.coraza-latest-commit.outputs.short }}
          title: 'docs: upgrades to latest coraza'
          assignees: ${{ github.actor }}
          body: |
            This PR upgrades the docs to latest coraza commit namely [${{ steps.coraza-latest-commit.outputs.short }}](https://github.com/corazawaf/coraza/tree/${{ steps.coraza-latest-commit.outputs.long }})

      - name: Check outputs
        if: ${{ github.event_name != 'pull_request' && steps.create-pr.outputs.pull-request-number }}
        env:
          PR_URL: ${{ steps.create-pr.outputs.pull-request-url }}
        run: |
          echo "Created PR at ${PR_URL}" >> $GITHUB_STEP_SUMMARY
