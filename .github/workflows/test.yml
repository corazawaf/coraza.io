name: Test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions: {}

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3.2.1
        with:
          hugo-version: '0.158.0'
          extended: true

      - name: Install deps
        run: npm install
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Install Chrome for Puppeteer
        # Puppeteer's bundled unzip leaves Chrome half-extracted on CI; unpack the pinned build ourselves.
        run: |
          EXEC=$(node -p "require('puppeteer').executablePath()")
          DEST=$(dirname "$(dirname "$EXEC")")
          BUILD=${DEST##*/linux-}
          curl -fsSL "https://storage.googleapis.com/chrome-for-testing-public/$BUILD/linux64/chrome-linux64.zip" -o /tmp/chrome.zip
          mkdir -p "$DEST" && unzip -q /tmp/chrome.zip -d "$DEST"
          test -x "$EXEC"

      - name: Start Hugo server
        run: |
          hugo server --port 1313 --disableLiveReload &
          sleep 5
          curl -sf http://localhost:1313/ > /dev/null

      - name: Run navigation tests
        run: npm test
